<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Image</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 8px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 24px;
        margin-bottom: 24px;
        color: #333;
      }

      label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 6px;
      }

      input[type='file'] {
        width: 100%;
        padding: 10px;
        margin-bottom: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #333;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #555;
      }

      #message {
        margin-top: 16px;
        font-size: 14px;
        text-align: center;
      }

      .success {
        color: green;
      }

      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Upload Image</h1>

      <label>Select an image to upload</label>
      <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" />

      <button onclick="uploadImage()">Upload</button>

      <div id="message"></div>
    </div>

    <script>
      async function uploadImage() {
        const fileInput = document.getElementById('fileInput');
        const message = document.getElementById('message');

        message.innerHTML = '';

        if (!fileInput.files || fileInput.files.length === 0) {
          message.innerHTML = '<span class="error">Please select a file first</span>';
          return;
        }

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
          const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();

          if (response.ok) {
            message.innerHTML = `<span class="success">${data.message}</span>`;
          } else {
            message.innerHTML = `<span class="error">${data.error}</span>`;
          }
        } catch {
          message.innerHTML = '<span class="error">Something went wrong</span>';
        }
      }
    </script>
  </body>
</html>
